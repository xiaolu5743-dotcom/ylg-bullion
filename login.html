<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YLG Bullion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --color-dark-bg: #111111;
            --color-panel-bg: #1A1A1A;
            --color-gold-accent: #FFD700;
            --color-text-light: #E0E0E0;
            --color-text-fade: #A0A0A0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--color-dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: var(--color-panel-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        .logo-y { font-size: 40px; font-weight: bold; color: var(--color-gold-accent); margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: white;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #FFD700;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-login:hover { background: #e6c200; }
        a { color: #A0A0A0; text-decoration: none; font-size: 13px; }
    </style>
    <link rel="stylesheet" href="mobile-responsive.css">
</head>
<body>

    <div class="login-card">
        <div class="logo-y">YLG</div>
        <h3>Login to Dashboard</h3>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submitBtn" class="btn-login">LOGIN</button>
        </form>
        
        <p style="margin-top: 20px;">
            <a href="register.html">Don't have an account? Register</a>
        </p>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBCvOnGL0ptipChgxuCtHzviZb9DZ3MAIk",
        authDomain: "ylg-bullion-7dac6.firebaseapp.com",
        databaseURL: "https://ylg-bullion-7dac6-default-rtdb.firebaseio.com", 
        projectId: "ylg-bullion-7dac6",
        storageBucket: "ylg-bullion-7dac6.firebasestorage.app",
        messagingSenderId: "1076979932884",
        appId: "1:1076979932884:web:8755edb4ccac71f69b6541",
        measurementId: "G-D16RR76JEP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // SweetAlert2 แฌกแฌแฌฝแฌฌแฌบ Default Theme ๏ฟฝ~แฌแฌบ๏ฟฝ"แฌพแฌแฌบแฌแฌผ๏ฟฝแฌบแฌธ
    const Toast = Swal.mixin({
        background: '#2A2A2A',
        color: '#fff',
        confirmButtonColor: '#FFD700'
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submitBtn');

        // แฌ๏ฟฝSแฌฏแฌแฌบแฌฌแฌญแฌฏ แฌแฌฑแฌแฌนแฌ๏ฟฝ"แฌญแฌแฌบ๏ฟฝแฌฌแฌธ๏ฟฝ"๏ฟฝaแฌบ
        submitBtn.disabled = true;
        submitBtn.innerText = "Checking...";

        setPersistence(auth, browserLocalPersistence)
            .then(() => {
                return signInWithEmailAndPassword(auth, email, password);
            })
            .then((userCredential) => {
                const user = userCredential.user;
                const name = user.displayName || email.split('@')[0];

                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', name);

                // แฌกแฌฑแฌฌ๏ฟฝแฌบ๏ฟฝ"แฌผ๏ฟฝแฌบแฌฌแฌผแฌฑแฌฌ๏ฟฝแฌบแฌธ Pop-up ๏ฟฝ"แฌผ๏ฟฝ"๏ฟฝaแฌบ
                Toast.fire({
                    icon: 'success',
                    title: 'Login แฌกแฌฑแฌฌ๏ฟฝแฌบ๏ฟฝ"แฌผ๏ฟฝแฌบ๏ฟฝ"แฌซ๏ฟฝ~๏ฟฝ`แฌบ๏ฟฝ9',
                    text: 'แฌแฌ๏ฟฝ&แฌฑแฌฌ๏ฟฝแฌทแฌบ๏ฟฝ"แฌฑแฌธ๏ฟฝ"แฌซ...',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.replace("index.html");
                });
            })
            .catch((error) => {
                console.error("Login Error:", error.code);
                submitBtn.disabled = false;
                submitBtn.innerText = "LOGIN";

                let errorMsg = "แฌก๏ฟฝ"แฌพแฌฌแฌธแฌ๏ฟฝ&แฌบแฌแฌฏ๏ฟฝ:แฌพแฌญ๏ฟฝแฌฑ๏ฟฝ"แฌซ๏ฟฝ~๏ฟฝ`แฌบ";
                
                if (error.code === 'auth/invalid-credential') {
                    errorMsg = "Email ๏ฟฝ~แฌญแฌฏแฌท๏ฟฝ"๏ฟฝxแฌฏแฌแฌบ Password ๏ฟฝ"แฌพแฌฌแฌธ๏ฟฝแฌฑ๏ฟฝ"แฌซ๏ฟฝ~๏ฟฝ`แฌบ๏ฟฝ9";
                } else if (error.code === 'auth/user-not-found') {
                    errorMsg = "แฌค Email ๏ฟฝแฌผ๏ฟฝแฌทแฌบ แฌกแฌฌแฌฑแฌฌ๏ฟฝแฌทแฌบ๏ฟฝ"๏ฟฝ:แฌพแฌญ๏ฟฝ~แฌฑแฌธ๏ฟฝ"แฌซ๏ฟฝ9";
                } else if (error.code === 'auth/network-request-failed') {
                    errorMsg = "แฌก๏ฟฝแฌบแฌแฌฌ๏ฟฝแฌฌแฌบ๏ฟฝSแฌญแฌฏ๏ฟฝแฌบแฌธ๏ฟฝ"แฌฌแฌฑแฌฌ๏ฟฝแฌบแฌธ๏ฟฝ"แฌซ๏ฟฝ9 VPN ๏ฟฝ~แฌญแฌฏแฌท๏ฟฝ"๏ฟฝxแฌฏแฌแฌบ ๏ฟฝSแฌญแฌฏ๏ฟฝแฌบแฌธแฌฌแฌญแฌฏ ๏ฟฝ"แฌผ๏ฟฝแฌบ๏ฟฝ&๏ฟฝ&แฌบ๏ฟฝ"แฌฑแฌธ๏ฟฝ"แฌซ๏ฟฝ9";
                } else {
                    errorMsg = error.message;
                }

                // Error Pop-up ๏ฟฝ"แฌผ๏ฟฝ"๏ฟฝaแฌบ (URL แฌฌแฌผแฌฎแฌธ ๏ฟฝ"๏ฟฝ"แฌซแฌแฌฑแฌฌแฌท๏ฟฝ"แฌซ)
                Toast.fire({
                    icon: 'error',
                    title: 'Login ๏ฟฝ"แฌกแฌฑแฌฌ๏ฟฝแฌบ๏ฟฝ"แฌผ๏ฟฝแฌบ๏ฟฝ"แฌซ',
                    text: errorMsg
                });
            });
    });
</script>

</body>
</html>
