<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Trading Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --color-dark-bg: #1A1A1A;
            --color-medium-dark: #2A2A2A; 
            --color-gold-accent: #FFD700;
            --color-text-light: #E0E0E0;
            --color-text-fade: #A0A0A0;
            --color-positive: #00B050; /* Buy Button ᬡ�:ᬱᬬ�ᬺ */
            --color-negative: #D93025; /* Sell Button ᬡ�:ᬱᬬ�ᬺ */
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-dark-bg);
            color: var(--color-text-light);
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Styling (Dashboard �ᬲᬷ ᬐᬰᬡᬱᬬ�ᬺ) */
        .sidebar { /* ᬡ�:ᬾᬱᬷᬬ dashboard.html �:ᬲᬷ sidebar CSS ᬡᬬᬸ�Sᬯᬶᬸᬬᬭᬯ �ᬮ�"ᬾᬬ ��"ᬺ��`ᬷᬺ�:�"ᬫ�"�aᬺ */
            width: 280px;
            background-color: var(--color-medium-dark);
            padding: 20px 0 20px 0;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
            /* ... (�aᬁ�ᬺ sidebar CSS �"ᬻᬬᬸᬡᬬᬸ�Sᬯᬶᬸ ᬤ�ᬱ�:ᬬᬐᬽ�ᬺ �"ᬫᬝ�ᬺ�:�"ᬫ�"�`ᬺ) ... */
        }
        
        /* Trading Panel Layout (Main Content) */
        .trading-layout {
            flex-grow: 1;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 2fr 1fr; /* �!�aᬬᬸᬡᬐᬽᬬᬺ �ᬱ�:ᬬ�"ᬭᬯ�"ᬱᬸ�"ᬼᬮᬸ Trading Panel ᬡᬐᬽᬬᬺ ��`ᬺᬸ��`ᬺᬸ�"ᬱᬸ�~�`ᬺ */
            gap: 30px;
        }

        .chart-area {
            background-color: var(--color-medium-dark);
            padding: 20px;
            border-radius: 8px;
            border-top: 3px solid var(--color-gold-accent);
        }

        .order-panel {
            background-color: var(--color-medium-dark);
            padding: 20px;
            border-radius: 8px;
            border-top: 3px solid var(--color-gold-accent);
        }

        /* Order Form Styling */
        .order-panel h3 {
            color: var(--color-white);
            border-bottom: 1px solid #3A3A3A;
            padding-bottom: 15px;
            margin-top: 0;
        }

        .order-form-group {
            margin-bottom: 15px;
        }

        .order-form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--color-text-fade);
        }

        .order-form-group input, .order-form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #444444;
            background-color: #333333;
            color: var(--color-white);
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .balance-info {
            text-align: center;
            padding: 15px;
            background-color: #333333;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .balance-info p {
            margin: 5px 0;
        }
        
        .balance-info span {
            color: var(--color-gold-accent);
            font-weight: bold;
        }

        /* Buy/Sell Buttons */
        .trade-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .trade-buttons button {
            width: 50%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .trade-buttons button:hover {
            opacity: 0.8;
        }

        .buy-btn {
            background-color: var(--color-positive); /* ᬡ�&ᬭ�"ᬺᬸ�:ᬱᬬ�ᬺ */
            color: var(--color-white);
        }

        .sell-btn {
            background-color: var(--color-negative); /* ᬡ�ᬮ�:ᬱᬬ�ᬺ */
            color: var(--color-white);
        }
    </style>
    <link rel="stylesheet" href="mobile-responsive.css">
</head>
<body>
    <div class="container">
        
        <aside class="sidebar">
            </aside>

        <main class="trading-layout">
            
            <div class="chart-area">
                <div class="live-price-summary">
                    <span style="font-size: 24px; font-weight: bold; color: var(--color-gold-accent);">XAU/USD: $2175.77</span>
                    <span style="color: var(--color-positive);">+1.27%</span>
                </div>
                
                <hr style="border-color: #3A3A3A; margin: 15px 0;">
                
                <div class="tradingview-chart-container">
                    <div class="tradingview-widget-container">
                      <div id="tradingview_chart_full"></div>
                      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                      <script type="text/javascript">
                      new TradingView.widget(
                      {
                      "width": "100%", 
                      "height": 700, /* �"ᬭᬯᬬᬼᬮᬸᬐᬲᬷ �!�aᬬᬸ */
                      "symbol": "COMEX:GC1!", 
                      "interval": "60", /* ၁ �ᬬ�:ᬮ �!�aᬬᬸ */
                      "timezone": "Etc/UTC",
                      "theme": "dark", 
                      "style": "1",
                      "locale": "en",
                      "toolbar_bg": "#f1f3f6",
                      "enable_publishing": false,
                      "allow_symbol_change": true,
                      "container_id": "tradingview_chart_full"
                      }
                      );
                      </script>
                    </div>
                </div>

            </div>

            <div class="order-panel">
                <h3><i class="fas fa-hand-holding-usd"></i> Order Placement</h3>
                
                <div class="balance-info">
                    <p>Balance: <span>$5,000.00 USD</span></p>
                    <p>Available Gold: <span>0.00 Oz</span></p>
                </div>

                <form>
                    <div class="order-form-group">
                        <label for="order_type">Order Type</label>
                        <select id="order_type">
                            <option value="market">Market Order (ᬁᬻᬬᬺᬁᬻ�ᬺᬸᬝ�aᬺ/�:ᬱᬬ�ᬺᬸ)</option>
                            <option value="limit">Limit Order</option>
                            <option value="stop">Stop Order</option>
                        </select>
                    </div>

                    <div class="order-form-group">
                        <label for="amount">Amount (Ounces)</label>
                        <input type="number" id="amount" value="1.0" min="0.01" step="0.01">
                    </div>

                    <div class="order-form-group">
                        <label for="price">Price (USD)</label>
                        <input type="text" id="price" value="$2175.77" disabled>
                    </div>

                    <div class="order-form-group">
                        <label for="leverage">Leverage</label>
                        <select id="leverage">
                            <option value="1">1:1</option>
                            <option value="5">5:1 (ᬡᬬᬼᬶ�"ᬼᬯ)</option>
                            <option value="10">10:1</option>
                            <option value="20">20:1</option>
                        </select>
                    </div>

                    <div class="trade-buttons">
                        <button type="submit" class="buy-btn">
                            <i class="fas fa-arrow-up"></i> BUY (LONG)
                        </button>
                        <button type="submit" class="sell-btn">
                            <i class="fas fa-arrow-down"></i> SELL (SHORT)
                        </button>
                    </div>
                </form>

                <p style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--color-text-fade);">
                    * Trading involves risk. Please trade responsibly.
                </p>
            </div>
            
        </main>
    </div>

</body>
</html>
