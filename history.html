<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade History - YLG Bullion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --color-dark-bg: #111111;
            --color-medium-dark: #1A1A1A;
            --color-gold-accent: #FFD700;
            --color-text-light: #E0E0E0;
            --color-text-fade: #A0A0A0;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--color-dark-bg); color: var(--color-text-light); margin: 0; display: flex; }
        .sidebar { width: 260px; min-height: 100vh; background-color: var(--color-medium-dark); display: flex; flex-direction: column; position: fixed; z-index: 1000; border-right: 1px solid #333; }
        .logo-section { padding: 20px; border-bottom: 1px solid #3A3A3A; display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--color-gold-accent); object-fit: cover; }
        .logo-y-text { font-size: 24px; font-weight: 800; color: var(--color-gold-accent); line-height: 1; }
        .logo-subtext { font-size: 16px; font-weight: 700; color: #FFFFFF; letter-spacing: 1px; }
        .sidebar nav { display: flex; flex-direction: column; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 15px 20px; color: var(--color-text-fade); text-decoration: none; transition: 0.3s; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background-color: #252525; color: white; border-left: 4px solid var(--color-gold-accent); }
        .side-profile { padding: 20px; border-top: 1px solid #333; display: none; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 20px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        /* Table & History Card */
        .history-card { background: var(--color-medium-dark); padding: 25px; border-radius: 12px; border: 1px solid #333; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--color-gold-accent); padding: 15px; border-bottom: 1px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        .win { color: #00B050; font-weight: bold; }
        .loss { color: #D93025; font-weight: bold; }

        /* ГЎв‚¬вЂ“ГЎв‚¬ВЇГЎв‚¬вЂќГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬в„ўГЎв‚¬ВѕГЎв‚¬В¬ ГЎв‚¬ВЎГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬Е ГЎв‚¬В·ГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬ВєГЎв‚¬ВЎГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬Вє ГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬вЂ ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВЃГЎв‚¬В»ГЎв‚¬в‚¬ГЎв‚¬Вє */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; position: relative; border-right: none; }
            .sidebar nav { flex-direction: row; flex-wrap: wrap; justify-content: space-around; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .nav-item { padding: 12px 10px; font-size: 12px; border-left: none !important; }
            .nav-item.active { border-bottom: 3px solid var(--color-gold-accent); }
            
            /* Table ГЎв‚¬в‚¬ГЎв‚¬В­ГЎв‚¬ВЇ Card ГЎв‚¬ВЎГЎв‚¬вЂ“ГЎв‚¬ВјГЎв‚¬вЂ¦ГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬Е“ГЎв‚¬ВІГЎв‚¬ВЃГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬Вё */
            .history-card { padding: 10px; overflow-x: visible; }
            thead { display: none; } /* Table ГЎв‚¬ВЃГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬вЂ¦ГЎв‚¬вЂ°ГЎв‚¬ВєГЎв‚¬в‚¬ГЎв‚¬В­ГЎв‚¬ВЇ ГЎв‚¬вЂ“ГЎв‚¬В»ГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬в‚¬ГЎв‚¬ВєГЎв‚¬в„ўГЎв‚¬ЕЎГЎв‚¬Вє */
            tr { 
                display: block; 
                margin-bottom: 15px; 
                border: 1px solid #333; 
                border-radius: 8px; 
                padding: 10px; 
                background: #222;
            }
            td { 
                display: flex; 
                justify-content: space-between; 
                padding: 10px 5px; 
                border-bottom: 1px solid #333; 
                text-align: right; 
                font-size: 13px;
            }
            td:last-child { border-bottom: none; }
            
            /* ГЎв‚¬ВЃГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬вЂ¦ГЎв‚¬вЂ°ГЎв‚¬ВєГЎв‚¬Е“ГЎв‚¬В±ГЎв‚¬ВёГЎв‚¬ВђГЎв‚¬ВЅГЎв‚¬В± ГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬вЂќГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬ВєГЎв‚¬ВЎГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬Вє ГЎв‚¬Е“ГЎв‚¬ВЇГЎв‚¬вЂўГЎв‚¬ВєГЎв‚¬ВЃГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬Вё */
            td::before {
                content: attr(data-label);
                float: left;
                font-weight: bold;
                color: var(--color-gold-accent);
                text-transform: uppercase;
                font-size: 11px;
            }
        }
    </style>
    <link rel="stylesheet" href="mobile-responsive.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section">
            <img src="logo.png" class="logo-img" alt="YLG" onerror="this.src='https://ui-avatars.com/api/?name=YLG&background=FFD700&color=000&bold=true'">
            <div class="logo-text-group">
                <div class="logo-y-text">YLG</div>
                <div class="logo-subtext">BULLION</div>
            </div>
        </div>
        <nav>
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="trading.html" class="nav-item"><i class="fas fa-chart-line"></i> Trading</a>
            <a href="portfolio.html" class="nav-item"><i class="fas fa-briefcase"></i> Portfolio</a>
            <a href="history.html" class="nav-item active"><i class="fas fa-history"></i> History</a>
            <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
        </nav>
        <div id="side-profile-box" class="side-profile">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-user-circle" style="font-size: 24px; color: var(--color-gold-accent);"></i>
                <span id="side-user-name" style="font-size: 12px; font-weight: bold;">User</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h2 id="page-title">Trade History</h2>
            <div id="head-user-display" style="color:var(--color-gold-accent); font-size: 13px;">Guest Mode</div>
        </header>

        <div class="history-card">
            <table>
                <thead>
                    <tr id="table-head">
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #555; padding: 40px;">Loading history...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCvOnGL0ptipChgxuCtHzviZb9DZ3MAIk",
            authDomain: "ylg-bullion-7dac6.firebaseapp.com",
            projectId: "ylg-bullion-7dac6",
            storageBucket: "ylg-bullion-7dac6.firebasestorage.app",
            messagingSenderId: "1076979932884",
            appId: "1:1076979932884:web:8755edb4ccac71f69b6541"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Language settings ГЎв‚¬в‚¬ГЎв‚¬В­ГЎв‚¬ВЇ JS ГЎв‚¬в‚¬ГЎв‚¬вЂќГЎв‚¬В± ГЎв‚¬Е“ГЎв‚¬ВѕГЎв‚¬в„ўГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬ЕЎГЎв‚¬В°ГЎв‚¬вЂ“ГЎв‚¬В­ГЎв‚¬ВЇГЎв‚¬В·
        let currentLang = localStorage.getItem('selectedLang') || 'en';
        const labels = {
            'en': ["Date", "Type", "Amount", "Status"],
            'mm': ["бЂ›бЂЂбЂєбЂ…бЂЅбЂІ", "бЂЎбЂ™бЂ»бЂ­бЂЇбЂёбЂЎбЂ…бЂ¬бЂё", "бЂ•бЂ™бЂ¬бЂЏ", "бЂЎбЂЃбЂјбЂ±бЂЎбЂ”бЂ±"],
            'th': ["Г ВёВ§Г ВёВ±Г Вёв„ўГ ВёвЂ”Г ВёВµГ В№Л†", "Г ВёвЂєГ ВёВЈГ ВёВ°Г В№в‚¬Г ВёВ Г ВёвЂ”", "Г ВёЛ†Г ВёВіГ Вёв„ўГ ВёВ§Г Вёв„ў", "Г ВёВЄГ ВёвЂ“Г ВёВІГ Вёв„ўГ ВёВ°"]
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const fullName = localStorage.getItem('userName') || user.displayName || 'Member';
                document.getElementById('head-user-display').innerText = "Account: " + fullName;
                document.getElementById('side-user-name').innerText = fullName;
                document.getElementById('side-profile-box').style.display = 'block';

                const q = query(collection(db, "users", user.uid, "trades"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const tbody = document.getElementById('history-body');
                    tbody.innerHTML = "";
                    
                    if (snapshot.empty) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #555; padding: 40px;">No trade history found.</td></tr>`;
                        return;
                    }

                    snapshot.forEach((doc) => {
                        const trade = doc.data();
                        let statusHTML = "";
                        if (trade.result === "WIN") {
                            const profit = (trade.payout || 0) - (trade.amount || 0);
                            statusHTML = `<span class="win">+$${profit.toFixed(2)}</span>`;
                        } else {
                            statusHTML = `<span class="loss">-$${(trade.amount || 0).toFixed(2)}</span>`;
                        }

                        const row = `
                            <tr>
                                <td data-label="${labels[currentLang][0]}">${trade.date || 'N/A'}</td>
                                <td data-label="${labels[currentLang][1]}">${trade.type}</td>
                                <td data-label="${labels[currentLang][2]}">$${(trade.amount || 0).toLocaleString()}</td>
                                <td data-label="${labels[currentLang][3]}">${statusHTML}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function applyHistoryLanguage(lang) {
            const texts = {
                'en': { nav: ["Dashboard", "Trading", "Portfolio", "History", "Wallet"], title: "Trade History", table: ["Date", "Type", "Amount", "Status"] },
                'mm': { nav: ["бЂ•бЂ„бЂєбЂ™бЂ…бЂ¬бЂ™бЂ»бЂЂбЂєбЂ”бЂѕбЂ¬", "бЂ›бЂЅбЂѕбЂ±бЂЂбЂЇбЂ”бЂєбЂћбЂЅбЂљбЂєбЂ›бЂ±бЂё", "бЂ•бЂ­бЂЇбЂ·бЂ–бЂ­бЂЇбЂњбЂ®бЂљбЂ­бЂЇ", "бЂЎбЂ›бЂ±бЂ¬бЂ„бЂєбЂёбЂЎбЂќбЂљбЂєбЂ™бЂѕбЂђбЂєбЂђбЂ™бЂєбЂё", "бЂ„бЂЅбЂ±бЂ‘бЂЉбЂє"], title: "бЂЂбЂЇбЂ”бЂєбЂћбЂЅбЂљбЂєбЂ™бЂѕбЂЇ бЂћбЂ™бЂ­бЂЇбЂ„бЂєбЂё", table: ["бЂ›бЂЂбЂєбЂ…бЂЅбЂІ", "бЂЎбЂ™бЂ»бЂ­бЂЇбЂёбЂЎбЂ…бЂ¬бЂё", "бЂ•бЂ™бЂ¬бЂЏ", "бЂЎбЂЃбЂјбЂ±бЂЎбЂ”бЂ±"] },
                'th': { nav: ["а№Ѓаё”аёЉаёљаё­аёЈа№Њаё”", "аёЃаёІаёЈаё‹аё·а№‰аё­аё‚аёІаёў", "аёћаё­аёЈа№Њаё•а№‚аёџаёҐаёґа№‚аё­", "аё›аёЈаё°аё§аё±аё•аёґ", "аёЃаёЈаё°а№Ђаё›а№‹аёІаёЄаё•аёІаё‡аё„а№Њ"], title: "аё›аёЈаё°аё§аё±аё•аёґаёЃаёІаёЈа№Ђаё—аёЈаё”", table: ["аё§аё±аё™аё—аёµа№€", "аё›аёЈаё°а№Ђаё аё—", "аё€аёіаё™аё§аё™", "аёЄаё–аёІаё™аё°"] }
            };
            const navItems = document.querySelectorAll('.nav-item');
            const icons = ["fa-th-large", "fa-chart-line", "fa-briefcase", "fa-history", "fa-wallet"];
            navItems.forEach((item, i) => { if(item && texts[lang].nav[i]) item.innerHTML = `<i class="fas ${icons[i]}"></i> ${texts[lang].nav[i]}`; });
            document.getElementById('page-title').innerText = texts[lang].title;
            const ths = document.querySelectorAll('thead th');
            ths.forEach((th, i) => { if(th) th.innerText = texts[lang].table[i]; });
        }
        applyHistoryLanguage(currentLang);
    </script>
</body>
</html>
