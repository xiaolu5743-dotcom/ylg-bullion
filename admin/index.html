    async function compressAdminImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

        await updateDoc(doc(db, "users", id), { tradeControl: status });

    };

    window.adjustBalance = async (id, type) => {
        const amtInput = document.getElementById(`amt-${id}`);
        const amt = parseFloat(amtInput.value);
        if (!amt || amt <= 0) return;
        
        if (type === 'plus') {
            // Deposit: increment both balance and depositBalance
            await updateDoc(doc(db, "users", id), { 
                balance: increment(amt),
                depositBalance: increment(amt)
            });
        } else {
            // Withdraw: only decrement balance
            await updateDoc(doc(db, "users", id), { 
                balance: increment(-amt)
            });
        }
        
        amtInput.value = "";
        Toast.fire({ icon: 'success', title: 'Balance updated' });
    };

    window.updateFrozen = async (id, frozen) => {
        await updateDoc(doc(db, "users", id), { frozen: frozen });

    window.deleteUser = async (id) => {
        const confirm = await Swal.fire({
            title: 'Are you sure?', text: "Delete this user?", icon: 'warning',
            showCancelButton: true, confirmButtonColor: '#D93025', background: '#1a1a1a', color: '#fff'
        });
        if(confirm.isConfirmed) {
            await deleteDoc(doc(db, "users", id));
            Toast.fire({ icon: 'success', title: 'User deleted' });
        }
    };

    window.editWithdrawDetails = async (id, currentDetails) => {
        const { value: newDetails } = await Swal.fire({
            title: 'Edit Bank Details', input: 'textarea', inputValue: currentDetails,
            background: '#1a1a1a', color: '#fff', showCancelButton: true
        });
        if (newDetails) {
            await updateDoc(doc(db, "withdrawals", id), { details: newDetails });
            Toast.fire({ icon: 'success', title: 'Details updated' });
        }
    };
